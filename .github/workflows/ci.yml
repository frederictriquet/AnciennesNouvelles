# CI — Anciennes Nouvelles [docs/TESTING.md — T-16]
name: CI

on:
  push:
    branches: ["master", "main"]
  pull_request:
    branches: ["master", "main"]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements-dev.txt

      - name: Run tests with coverage
        run: pytest --cov=ancnouv --cov-report=term-missing --cov-fail-under=80 -q

  publish:
    needs: test
    runs-on: ubuntu-latest
    # Publier uniquement sur push (pas sur les PRs)
    if: github.event_name == 'push'
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Normaliser le nom du dépôt en minuscules
        run: echo "REPO=${GITHUB_REPOSITORY,,}" >> $GITHUB_ENV

      - name: Build and push ancnouv (app principale)
        uses: docker/build-push-action@v5
        with:
          context: .
          dockerfile: Dockerfile
          push: true
          tags: ghcr.io/${{ env.REPO }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push ancnouv-images (serveur d'images)
        uses: docker/build-push-action@v5
        with:
          context: .
          dockerfile: Dockerfile.images
          push: true
          tags: ghcr.io/${{ env.REPO }}-images:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
