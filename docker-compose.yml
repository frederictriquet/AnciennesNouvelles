version: "3.9"

services:
  ancnouv:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      - ancnouv-images
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
      - ./config.yml:/app/config.yml:ro
      - ./.env:/app/.env:ro
      # [D-04] assets/ monté en rw — requis pour setup fonts/audio.
      # Sur le VPS (pas de Python local) : docker exec <container> python -m ancnouv setup fonts
      #                                    docker exec <container> python -m ancnouv setup audio
      # Les fichiers sont écrits dans le conteneur et persistés sur le host via ce volume.
      - ./assets:/app/assets
    environment:
      - TZ=Europe/Paris
    networks:
      - ancnouv-net

  ancnouv-images:
    build:
      context: .
      dockerfile: Dockerfile.images
    restart: unless-stopped
    ports:
      # Exposé uniquement sur le loopback — nginx proxie depuis l'extérieur
      - "127.0.0.1:8765:8765"
    volumes:
      - ./data/images:/app/data/images
      - ./.env:/app/.env:ro
    networks:
      - ancnouv-net

  ancnouv-dashboard:
    build:
      context: ./dashboard
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      - ancnouv
    ports:
      # Exposé uniquement sur le loopback — accès sécurisé géré par le reverse proxy
      - "127.0.0.1:8766:8766"
    volumes:
      - ./data:/app/data            # DB SQLite partagée (rw — config_overrides uniquement)
      - ./config.yml:/app/config.yml:ro
    environment:
      - DB_PATH=/app/data/ancnouv.db
      - TZ=Europe/Paris
    networks:
      - ancnouv-net

networks:
  ancnouv-net:
    driver: bridge
